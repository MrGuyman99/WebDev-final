<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <title>API</title>
</head>

<body>
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="index.html">Home</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item active">
            <a class="nav-link" href="documentation.html">How this works <span class="sr-only">(current)</span></a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="row mt-3">
      <div class="col-md-12">
        <form id="filePicker">
          <div class="form-group">
            <label for="searchTerm">Search Term:</label>
            <input type="text" required class="form-control" id="searchTerm" aria-describedby="emailHelp">
            <small class="form-text text-muted">Case Sensitive!</small>
          </div>
          <div class="form-check">
            <input class="form-check-input" required name="search_type" type="radio" value="2" id="Property">
            <label class="form-check-label" for="defaultCheck1">
              Search By Property Name
            </label>
          </div><br>
          <div class="form-check">
            <input class="form-check-input" required name="search_type" type="radio" value="4" id="Address">
            <label class="form-check-label" for="defaultCheck1">
              Search By Address
            </label>
          </div><br>
          <div class="form-check">
            <input class="form-check-input" required name="search_type" type="radio" value="5" id="ZIP">
            <label class="form-check-label" for="defaultCheck1">
              Search By ZIP Code
            </label>
          </div><br>
          <div class="form-check">
            <input class="form-check-input" required name="search_type" type="radio" value="6" id="Energy">
            <label class="form-check-label" for="defaultCheck1">
              Search By Chicago Energy Rating (Be warned, this will bring up many many entries)
            </label>
          </div><br>
          <div class="input-group">
            <div class="custom-file">
              <input type="file" required class="custom-file-input" accept=".CSV" id="filepicker"
                aria-describedby="inputGroupFileAddon04">
              <label class="custom-file-label" for="filepicker">Choose file</label>
            </div>
          </div>
          <br>
          <div class="text-center">
            <button class="btn btn-primary" id="buttonSubmit">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12 mt-3">
        <p id="output" class="border rounded"></p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
    crossorigin="anonymous"></script>
  <script defer src="script.js"></script>
</body>

</html>
